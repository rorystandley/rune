# Automated dependency updates. Dart/Flutter packages are grouped per week to
# keep PR noise low; GitHub Actions updates keep the full-length SHA pins fresh
# (Dependabot bumps the pinned SHA and updates the version comment).
version: 2
updates:
  - package-ecosystem: pub
    directory: /app
    schedule:
      interval: weekly
      day: monday
    groups:
      app-dependencies:
        patterns: ["*"]

  - package-ecosystem: pub
    directory: /packages/notes_core
    schedule:
      interval: weekly
      day: monday
    groups:
      core-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
