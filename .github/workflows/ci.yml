name: ci

# Static analysis + the full test suite on every push and pull request. The
# security-critical code lives in packages/notes_core (pure Dart), so its
# crypto/storage tests run under plain `dart test` with no device or emulator;
# the app tests run under `flutter test`. This is the public signal behind the
# security claims: the encryption tests pass on every commit. No platform
# toolchain (Xcode/Android SDK) is needed to analyze or test.
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  analyze-and-test:
    name: analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Install Flutter without a third-party action. The repo requires every action to be
      # pinned to a full-length commit SHA, and subosito/flutter-action is a composite
      # action that transitively references an unpinned actions/cache@v5, which is blocked
      # at job setup. Cloning the SDK at the pinned tag uses no action references; the clone
      # provides both `flutter` and `dart`.
      - name: Set up Flutter
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" \
            https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        run: flutter --version

      # --- packages/notes_core: pure Dart, where the security lives ---
      - name: Core — get dependencies
        working-directory: packages/notes_core
        run: dart pub get

      - name: Core — analyze
        working-directory: packages/notes_core
        run: dart analyze

      - name: Core — test
        working-directory: packages/notes_core
        run: dart test

      # --- app: thin Flutter UI layer ---
      - name: App — get dependencies
        working-directory: app
        run: flutter pub get

      - name: App — analyze
        working-directory: app
        run: flutter analyze

      - name: App — test
        working-directory: app
        run: flutter test
