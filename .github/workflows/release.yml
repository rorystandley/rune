name: release

# Builds every platform on a version tag and publishes a (draft) GitHub Release
# with checksums. Every release also gets cryptographic provenance with no secrets:
# SLSA build-provenance attestations over each artifact and a keyless cosign signature
# over SHA256SUMS (see the `release` job and RELEASE.md → "Verifying a release").
# Platform code-signing/notarization need repo secrets and are gated below; without them
# you still get installable test artifacts (Android falls back to debug signing; macOS is
# ad-hoc signed; iOS is an unsigned compile check).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.2"
  # Pinned Android build input (NDK r28c) — matches flutter.ndkVersion,
  # RELEASE.md and docs/reproducibility.md.
  NDK_VERSION: "28.2.13676358"
  # Deterministic packaging: force UTC so any timestamp that does slip through is
  # at least stable across runners.
  TZ: "UTC"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: android }
          - { os: ubuntu-latest, target: linux }
          - { os: macos-latest, target: macos }
          - { os: macos-latest, target: ios }
          - { os: windows-latest, target: windows }
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      # Deterministic build clock. Derive SOURCE_DATE_EPOCH from the tag commit's
      # date so an independent rebuild of the same commit gets the same value;
      # honoured by the archive packaging below (and exported into the Android
      # build). The tag checkout has depth 1, which is enough for the tip date.
      - name: Set SOURCE_DATE_EPOCH
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up Java (Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      # Install Flutter without a third-party action. The repo ruleset requires every
      # action to be pinned to a full-length commit SHA, and subosito/flutter-action is a
      # composite action that transitively references an unpinned actions/cache@v5, which
      # the ruleset blocks. Cloning the SDK at the pinned tag uses no action references and
      # lets Flutter select the correct host architecture (e.g. arm64 macOS runners).
      - name: Set up Flutter
        shell: bash
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" \
            https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        shell: bash
        run: flutter --version

      # Pin the NDK that AGP uses to strip the bundled .so files, so the published
      # APK/AAB is built against the same NDK the reproducibility job and F-Droid use.
      - name: Pin the Android NDK
        if: matrix.target == 'android'
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION" >/dev/null
          echo "installed NDK $NDK_VERSION"

      - name: Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libsecret-1-dev

      # Optional release signing for Android. Add these repo secrets to sign for
      # Google Play; otherwise the build uses debug signing (test artifact only).
      - name: Android signing
        if: matrix.target == 'android'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            KS="$RUNNER_TEMP/upload-keystore.jks"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KS"
            cat > android/key.properties <<EOF
          storeFile=$KS
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF
            echo "release signing configured"
          else
            echo "no keystore secret; using debug signing (test artifact only)"
          fi

      - name: Get dependencies
        shell: bash
        run: flutter pub get

      - name: Build Android
        if: matrix.target == 'android'
        # Determinism is configured in app/android/app/build.gradle.kts (Play
        # dependency-metadata off, R8 off), the pinned NDK above, SOURCE_DATE_EPOCH,
        # and the path-normalising Android build wrapper used by the
        # `reproducibility` workflow; see RELEASE.md and docs/reproducibility.md.
        run: |
          mkdir -p dist
          ../tool/reproducibility/build_release_apk.sh dist/rune-android.apk
          APP_DIR="$(pwd -P)"
          flutter build appbundle --release \
            --android-project-arg=filesystem-roots="$APP_DIR" \
            --android-project-arg=filesystem-scheme=org-dartlang-root
          cp build/app/outputs/bundle/release/app-release.aab dist/rune-android.aab

      # Optional: publish the signed AAB to Google Play. Gated on the
      # PLAY_SERVICE_ACCOUNT_JSON secret (a Play Console service-account key) and
      # only on version-tag pushes. If the secret is absent the step is a no-op and
      # the build still succeeds. Defaults to the `internal` track; promote to
      # production from the Play Console (or change `--track` to `production` and
      # `--release_status` to `draft`). Uses fastlane supply (a Ruby gem, no GitHub
      # Action) so it doesn't trip the repo's SHA-pinning ruleset; it reads the
      # in-repo fastlane/metadata for the matching changelog and uploads only the
      # binary + release notes (listing text/images are left untouched).
      - name: Publish to Google Play (internal track)
        if: matrix.target == 'android' && startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ github.workspace }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "no PLAY_SERVICE_ACCOUNT_JSON secret; skipping Play upload"
            exit 0
          fi
          JSON="$RUNNER_TEMP/play-service-account.json"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > "$JSON"
          gem install fastlane --no-document
          fastlane supply \
            --aab app/dist/rune-android.aab \
            --track internal \
            --release_status completed \
            --json_key "$JSON" \
            --package_name co.rorystandley.rune \
            --skip_upload_apk true \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          mkdir -p dist
          # Deterministic tar.gz: sort entries by name, stamp every entry with
          # SOURCE_DATE_EPOCH, zero owner/group, drop nondeterministic pax atime/ctime
          # headers, and gzip with -n (no name/timestamp in the gzip header). The
          # Flutter Linux bundle itself is not guaranteed reproducible — this just
          # captures the cheap archive-level determinism win.
          tar --sort=name --mtime="@${SOURCE_DATE_EPOCH}" \
              --owner=0 --group=0 --numeric-owner \
              --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
              -C build/linux/x64/release/bundle -cf - . \
            | gzip -n > dist/rune-linux-x64.tar.gz

      # Keychain Sharing requires a provisioned development/distribution
      # signature. Preserve the real release entitlements for the later
      # Developer ID signing step, but strip that capability while producing
      # the deliberately ad-hoc intermediate/test artifact.
      - name: Prepare macOS ad-hoc build
        if: matrix.target == 'macos'
        run: |
          cp macos/Runner/Release.entitlements "$RUNNER_TEMP/RuneRelease.entitlements"
          /usr/libexec/PlistBuddy -c "Delete :keychain-access-groups" \
            macos/Runner/Release.entitlements

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      # Developer ID signing + notarization for distribution outside the Mac App Store.
      # Gated on the five secrets below; when ANY is absent the app stays ad-hoc signed
      # (a fine test artifact) and the build still succeeds. Secrets are documented in
      # RELEASE.md ("Verifying a release" → secrets to add).
      - name: Sign & notarize macOS (Developer ID)
        if: matrix.target == 'macos'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/Rune.app"
          if [ -z "$MACOS_CERT_P12_BASE64" ] || [ -z "$MACOS_CERT_PASSWORD" ] \
             || [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] \
             || [ -z "$APPLE_TEAM_ID" ]; then
            echo "macOS signing secrets absent; leaving the ad-hoc signed app (test artifact only)."
            exit 0
          fi
          # 1. Import the Developer ID Application cert into a throwaway keychain.
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          CERT="$RUNNER_TEMP/developer_id.p12"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT"
          security import "$CERT" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make our keychain the one codesign searches for the identity.
          security list-keychains -d user -s "$KEYCHAIN"
          # 2. Resolve the "Developer ID Application" identity from the imported cert.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in MACOS_CERT_P12_BASE64"
            exit 1
          fi
          echo "Signing as: $IDENTITY"
          # 3. Codesign with hardened runtime + the existing release entitlements.
          codesign --force --deep --options runtime --timestamp \
            --entitlements "$RUNNER_TEMP/RuneRelease.entitlements" \
            --sign "$IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          # 4. Notarize (submit a zip, wait for Apple's verdict).
          SUBMIT_ZIP="$RUNNER_TEMP/notarize.zip"
          ditto -c -k --keepParent "$APP" "$SUBMIT_ZIP"
          xcrun notarytool submit "$SUBMIT_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          # 5. Staple the notarization ticket onto the .app so it verifies offline.
          xcrun stapler staple "$APP"
          echo "macOS app signed (Developer ID), notarized and stapled."

      - name: Package macOS
        if: matrix.target == 'macos'
        # macOS reproducibility is out of scope (F-Droid is Android-only). ditto
        # preserves timestamps, so this archive is not byte-deterministic — that is
        # acceptable per RELEASE.md; provenance + cosign still cover it.
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/Rune.app" \
            "dist/rune-macos.zip"

      - name: Build iOS (unsigned compile check)
        if: matrix.target == 'ios'
        # A signed, uploadable IPA needs certs/profiles (e.g. fastlane match) via
        # secrets; this job just proves the iOS build compiles.
        run: flutter build ios --release --no-codesign

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: bash
        run: |
          flutter build windows --release
          mkdir -p dist
          # Cheap determinism win: normalise file mtimes to SOURCE_DATE_EPOCH before
          # zipping so the archive isn't stamped with the build time. (Full Windows
          # build reproducibility is out of scope — see RELEASE.md.)
          find build/windows/x64/runner/Release -exec touch -d "@${SOURCE_DATE_EPOCH}" {} +
          7z a -tzip dist/rune-windows-x64.zip ./build/windows/x64/runner/Release/*

      - name: Upload artifacts
        if: matrix.target != 'ios'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: app/dist/*
          if-no-files-found: error

  release:
    needs: build
    # Only publish on a version tag. softprops/action-gh-release needs a tag_name, which
    # comes from refs/tags/* ; under workflow_dispatch (a branch ref) there is no tag, so
    # skip the job rather than fail it. The build matrix still runs on manual dispatch.
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    # Least privilege, but enough for cryptographic provenance:
    #   contents: write     — create/update the draft release
    #   id-token: write      — mint the OIDC token for keyless cosign signing + attestations
    #   attestations: write  — store SLSA build-provenance attestations for the artifacts
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      # SLSA build provenance for every release file (artifacts + SHA256SUMS). Anyone can
      # later verify a download was built by this workflow from this repo with:
      #   gh attestation verify <file> --repo rorystandley/rune
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      # Keyless Sigstore signature over the checksums using this workflow's OIDC identity
      # (no long-lived keys). Produces SHA256SUMS.cosign.bundle, which is uploaded below and
      # verified with cosign verify-blob (see RELEASE.md → "Verifying a release").
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign checksums (cosign keyless)
        run: |
          cd dist
          cosign sign-blob --yes SHA256SUMS --bundle SHA256SUMS.cosign.bundle

      - name: Publish draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*
