name: labeler

# Auto-labels pull requests by the paths they touch (see .github/labeler.yml).
# Uses pull_request_target so labels can be applied to PRs from forks; the
# checkout below is of the *base* branch config only, never fork code.
on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
